
name: My CI/CD Pipeline   # Workflow Name

on: 
  push:                  # Event: Trigger when code is pushed
    branches:
      - main

jobs:
  build:                 # Job Name
    runs-on: ubuntu-latest   # Runner environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show current directory
        run: pwd

      - name: List files
        run: ls -la

      - name: Make directory
        run: mkdir my_folder

      - name: Echo message
        run: echo "I am learning Github Actions"
